name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm build-essential
          # Install bpftool - try kernel-specific package first, then generic fallbacks
          sudo apt-get install -y linux-tools-$(uname -r) 2>/dev/null \
            || sudo apt-get install -y linux-tools-azure 2>/dev/null \
            || sudo apt-get install -y linux-tools-generic 2>/dev/null \
            || sudo apt-get install -y bpftool
          # Symlink bpftool if wrapper fails due to version mismatch
          if ! bpftool version >/dev/null 2>&1; then
            BPFTOOL=$(find /usr/lib/linux-tools -name bpftool -type f 2>/dev/null | head -1)
            if [ -n "$BPFTOOL" ]; then
              sudo ln -sf "$BPFTOOL" /usr/local/bin/bpftool
            fi
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build eBPF programs
        run: make build-ebpf

      - name: Build Go binaries
        run: |
          make build-rootkit
          make build-client
          make build-webapp

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
