name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm build-essential linux-tools-common
          # Install kernel-matched bpftool (try exact, then meta-packages)
          sudo apt-get install -y "linux-tools-$(uname -r)" \
            || sudo apt-get install -y linux-tools-azure \
            || sudo apt-get install -y linux-tools-generic \
            || true
          # The linux-tools-common wrapper may fail on version mismatch;
          # bypass it by symlinking the actual binary
          BPFTOOL_BIN=$(find /usr/lib/linux-tools -name bpftool -type f 2>/dev/null | sort -V | tail -1)
          if [ -n "$BPFTOOL_BIN" ]; then
            sudo ln -sf "$BPFTOOL_BIN" /usr/local/bin/bpftool
          fi
          bpftool version

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build eBPF programs
        run: make build-ebpf

      - name: Build Go binaries
        run: |
          make build-rootkit
          make build-client
          make build-webapp

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
