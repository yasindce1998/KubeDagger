name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm build-essential
          sudo apt-get install -y "linux-tools-$(uname -r)" || sudo apt-get install -y linux-tools-generic || true
          # Find and symlink the real bpftool binary (wrapper script has version-matching bugs on Azure kernels)
          BPFTOOL_BIN=$(find /usr/lib/linux-tools* -name bpftool -type f 2>/dev/null | head -1)
          if [ -z "$BPFTOOL_BIN" ]; then
            BPFTOOL_BIN=$(dpkg -L "linux-tools-$(uname -r)" 2>/dev/null | grep bpftool | head -1)
          fi
          if [ -n "$BPFTOOL_BIN" ]; then
            sudo ln -sf "$BPFTOOL_BIN" /usr/local/bin/bpftool
          fi
          /usr/local/bin/bpftool version || bpftool version

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build eBPF programs
        run: make build-ebpf

      - name: Build Go binaries
        run: |
          make build-rootkit
          make build-client
          make build-webapp

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
