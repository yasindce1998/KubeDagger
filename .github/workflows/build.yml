name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm linux-headers-$(uname -r) build-essential

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build eBPF programs
        run: make build-ebpf

      - name: Build Go binaries
        run: |
          make build-rootkit
          make build-client
          make build-webapp

      - name: Vet
        run: go vet ./...
