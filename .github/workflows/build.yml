name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm build-essential libelf-dev
          # Build bpftool from source (distro packages broken on Azure kernel runners)
          git clone --depth 1 --recurse-submodules https://github.com/libbpf/bpftool.git /tmp/bpftool
          make -C /tmp/bpftool/src -j$(nproc)
          sudo make -C /tmp/bpftool/src install
          bpftool version

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build eBPF programs
        run: make build-ebpf

      - name: Build Go binaries
        run: |
          make build-rootkit
          make build-client
          make build-webapp

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Integration Test
        run: sudo $(which go) test -tags integration -v -count=1 -timeout 60s ./pkg/kubedagger/

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
