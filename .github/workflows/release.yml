name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build-ebpf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm build-essential libelf-dev
          git clone --depth 1 --recurse-submodules https://github.com/libbpf/bpftool.git /tmp/bpftool
          make -C /tmp/bpftool/src -j$(nproc)
          sudo make -C /tmp/bpftool/src install

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'

      - name: Build eBPF programs
        run: make build-ebpf

      - name: Upload eBPF objects
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ebpf-objects
          path: pkg/assets/bin/*.o

  build-binaries:
    needs: build-ebpf
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'

      - name: Download eBPF objects
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ebpf-objects
          path: pkg/assets/bin/

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist

          # kubedagger and kubedagger-client depend on eBPF (Linux-only)
          if [ "$GOOS" = "linux" ]; then
            go build -ldflags "${LDFLAGS}" -o dist/kubedagger-${{ matrix.suffix }} ./cmd/kubedagger
            go build -ldflags "${LDFLAGS}" -o dist/kubedagger-client-${{ matrix.suffix }} ./cmd/kubedagger-client
          fi

          go build -ldflags "${LDFLAGS}" -o dist/kubedagger-server-${{ matrix.suffix }}${{ matrix.ext }} ./cmd/kubedagger-server
          go build -ldflags "${LDFLAGS}" -o dist/kubedagger-operator-${{ matrix.suffix }}${{ matrix.ext }} ./cmd/kubedagger-operator
          go build -ldflags "${LDFLAGS}" -o dist/kubedagger-agent-${{ matrix.suffix }}${{ matrix.ext }} ./cmd/kubedagger-agent

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: dist/

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # main

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts/
          pattern: binaries-*
          merge-multiple: true

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt

      - name: Sign checksums with cosign (keyless)
        run: cosign sign-blob --yes artifacts/checksums.txt --output-signature artifacts/checksums.txt.sig --output-certificate artifacts/checksums.txt.pem

      - name: Sign binaries with cosign (keyless)
        run: |
          for f in artifacts/*; do
            [ -f "$f" ] || continue
            case "$f" in *.sig|*.pem|checksums.txt) continue ;; esac
            cosign sign-blob --yes "$f" --output-signature "${f}.sig" --output-certificate "${f}.pem"
          done

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          output-file: artifacts/sbom.spdx.json
          format: spdx-json

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
