  <rect x="60" y="315" width="200" height="80" rx="6" fill="#161b22" stroke="#ffff00" stroke-width="2" filter="url(#neonYellow)"/>
  <text x="160" y="340" text-anchor="middle" fill="#ffff00" font-family="monospace" font-size="13" font-weight="bold">3. PRIVESC</text>
  <text x="160" y="360" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">escape (privileged/socket/</text>
  <text x="160" y="375" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">cgroup/nsenter)</text>
  <text x="160" y="390" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="9">k8s abuse, cloud_exploit</text>
