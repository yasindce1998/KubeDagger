  <line x1="150" y1="55" x2="750" y2="55" stroke="#21262d" stroke-width="1"/>

  <!-- 1. INITIAL ACCESS -->
  <rect x="60" y="75" width="200" height="80" rx="6" fill="#161b22" stroke="#ff3333" stroke-width="2" filter="url(#neonRed)"/>
  <text x="160" y="100" text-anchor="middle" fill="#ff3333" font-family="monospace" font-size="13" font-weight="bold">1. INITIAL ACCESS</text>
  <text x="160" y="120" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">RCE in pod, stolen</text>
