  <text x="160" y="255" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">honeypot_detect, network_discovery</text>
  <text x="160" y="270" text-anchor="middle" fill="#e6edf3" font-family="monospace" font-size="9">sa_token</text>
